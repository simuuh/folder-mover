<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>folder.mover · Login</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23141720'/><path d='M6 10h8l2 3h10v12H6z' fill='none' stroke='%234f8ef7' stroke-width='2' stroke-linejoin='round'/><path d='M11 19l3 3 5-5' stroke='%233ecf76' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg:      #0d0f12;
    --surface: #141720;
    --border:  #252a35;
    --text:    #c8d0e0;
    --muted:   #5a6275;
    --accent:  #4f8ef7;
    --red:     #ef4444;
    --mono:    'JetBrains Mono', monospace;
    --sans:    'Inter', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 36px;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type="text"],
  input[type="password"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input:focus { border-color: var(--accent); }

  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 6px;
    color: var(--red);
    font-size: 13px;
    padding: 9px 12px;
    text-align: center;
  }

  button[type="submit"] {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button[type="submit"]:hover { background: #6ba3ff; }
  button[type="submit"]:active { transform: scale(0.98); }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">folder<span>.</span>mover</div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="post" class="form-group">
    <div class="field">
      <label for="username">Benutzername</label>
      <input type="text" id="username" name="username" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label for="password">Passwort</label>
      <input type="password" id="password" name="password" autocomplete="current-password">
    </div>
    <button type="submit">Anmelden</button>
  </form>
</div>
</body>
</html>
